name: Build and Publish Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # The image has its OWN SemVer tag, independent of the Hermes
      # version it wraps. Bumping Hermes (or any Dockerfile/mise change)
      # is just a commit to main → this workflow runs → patch +1 → Flux
      # picks up the new tag. MAJOR.MINOR is fixed via VERSION_PREFIX;
      # bump it manually (0.2, 1.0, …) for a minor/major release, which
      # resets the patch counter.
      # ----------------------------------------------------------------
      - name: Compute version tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_PREFIX: "0.1" # bump to 0.2 / 1.0 for a minor/major release
        run: |
          set -euo pipefail
          PREFIX="${VERSION_PREFIX}"
          echo "Version prefix (major.minor): ${PREFIX}"

          # Lowercase owner → package name on GHCR
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          PACKAGE="hermes-kit"
          IMAGE_NAME="ghcr.io/${OWNER_LC}/${PACKAGE}"
          echo "image=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

          # Fetch all tags currently published for this package.
          # First run → package doesn't exist yet → empty result.
          EXISTING_TAGS=$(gh api --paginate \
              "/user/packages/container/${PACKAGE}/versions" \
              --jq '.[].metadata.container.tags[]?' 2>/dev/null || true)

          # Find the highest PATCH among tags matching <PREFIX>.<PATCH>.
          # Start at -1 so the first build of a prefix yields .0 (e.g. 0.1.0).
          MAX_PATCH=-1
          if [[ -n "${EXISTING_TAGS}" ]]; then
            while IFS= read -r tag; do
              [[ -z "${tag}" ]] && continue
              if [[ "${tag}" =~ ^${PREFIX}\.([0-9]+)$ ]]; then
                p=$((10#${BASH_REMATCH[1]}))
                if (( p > MAX_PATCH )); then MAX_PATCH=${p}; fi
              fi
            done <<< "${EXISTING_TAGS}"
          fi

          NEXT_PATCH=$((MAX_PATCH + 1))
          TAG="${PREFIX}.${NEXT_PATCH}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed image tag: ${TAG}  (previous patch: ${MAX_PATCH})"

      # The Hermes version the image is built FROM is read from the Dockerfile
      # ARG and passed as a build-arg. It is NOT the image tag (see above).
      - name: Read Hermes version from Dockerfile
        id: hermes
        run: |
          set -euo pipefail
          VER=$(sed -nE 's/^ARG HERMES_VERSION=(.*)/\1/p' Dockerfile | head -1)
          if [ -z "${VER}" ]; then
            echo "Could not find ARG HERMES_VERSION=... in Dockerfile" >&2
            exit 1
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Building FROM nousresearch/hermes-agent:${VER}"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            HERMES_VERSION=${{ steps.hermes.outputs.version }}
          push: true
          tags: |
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.tag }}
            ${{ steps.version.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------------------
      # Retention: keep only the most recent N image versions to stay
      # under the GHCR free-tier storage quota (500 MB shared).
      # The version currently tagged `latest` is never deleted.
      # ----------------------------------------------------------------
      - name: Prune old image versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: "10"
          PACKAGE: hermes-kit
        run: |
          set -euo pipefail

          # List every version with its tags and creation date.
          versions=$(gh api --paginate \
              "/user/packages/container/${PACKAGE}/versions" \
              --jq '[.[] | {id, created_at, tags: (.metadata.container.tags // [])}]' \
              2>/dev/null || echo "[]")

          if [[ "$versions" == "[]" ]]; then
            echo "No versions found (first run?). Skipping prune."
            exit 0
          fi

          # Protect the version currently carrying the `latest` tag.
          latest_id=$(echo "$versions" | jq -r '.[] | select(.tags | index("latest")) | .id' | head -1)
          echo "Protected (latest) version id: ${latest_id}"

          # Everything older than the newest KEEP versions, excluding latest.
          to_delete=$(echo "$versions" \
            | jq -r --argjson keep "$KEEP" --argjson latest "$latest_id" \
              'sort_by(.created_at) | reverse | .[$keep:] | .[] | select(.id != $latest) | .id')

          if [[ -z "${to_delete}" ]]; then
            echo "Nothing to prune (≤ ${KEEP} versions)."
            exit 0
          fi

          for id in $to_delete; do
            echo "Deleting version ${id}..."
            gh api -X DELETE "/user/packages/container/${PACKAGE}/versions/${id}"
          done
          echo "Prune complete."
