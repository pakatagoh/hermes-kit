name: Build and Publish Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # The image is tagged <epoch-millis>-<short-sha>, e.g.
      # 1735689600123-abc1234. The epoch is monotonic across builds and
      # millisecond-grained so two builds in the same second can't
      # collide. The 7-char short SHA ties the tag back to its commit.
      # ----------------------------------------------------------------
      - name: Compute image name
        id: image
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER_LC}/hermes-kit" >> "$GITHUB_OUTPUT"

      - name: Compute image tag
        id: image_tag
        run: |
          echo "tag=$(date -u +%s%3N)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # The Hermes version the image is built FROM is read from the Dockerfile
      # ARG and passed as a build-arg. It is NOT the image tag (see above).
      - name: Read Hermes version from Dockerfile
        id: hermes
        run: |
          set -euo pipefail
          VER=$(sed -nE 's/^ARG HERMES_VERSION=(.*)/\1/p' Dockerfile | head -1)
          if [ -z "${VER}" ]; then
            echo "Could not find ARG HERMES_VERSION=... in Dockerfile" >&2
            exit 1
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Building FROM nousresearch/hermes-agent:${VER}"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            HERMES_VERSION=${{ steps.hermes.outputs.version }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------------------
      # Retention: keep only the most recent N image versions to stay
      # under the GHCR free-tier storage quota (500 MB shared).
      # ----------------------------------------------------------------
      - name: Prune old image versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: "10"
          PACKAGE: hermes-kit
        run: |
          set -euo pipefail

          # List every version with its tags and creation date.
          versions=$(gh api --paginate \
              "/user/packages/container/${PACKAGE}/versions" \
              --jq '[.[] | {id, created_at, tags: (.metadata.container.tags // [])}]' \
              2>/dev/null || echo "[]")

          if [[ "$versions" == "[]" ]]; then
            echo "No versions found (first run?). Skipping prune."
            exit 0
          fi

          # There is no `latest` tag anymore; retention keeps the newest
          # KEEP versions by creation date and deletes everything older.
          to_delete=$(echo "$versions" \
            | jq -r --argjson keep "$KEEP" \
              'sort_by(.created_at) | reverse | .[$keep:] | .[].id')

          if [[ -z "${to_delete}" ]]; then
            echo "Nothing to prune (≤ ${KEEP} versions)."
            exit 0
          fi

          for id in $to_delete; do
            echo "Deleting version ${id}..."
            gh api -X DELETE "/user/packages/container/${PACKAGE}/versions/${id}"
          done
          echo "Prune complete."
